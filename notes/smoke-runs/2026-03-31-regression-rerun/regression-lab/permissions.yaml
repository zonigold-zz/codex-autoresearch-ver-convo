permissions:
  raw_data:
    path: "data/sample-eeg"
    policy: "read_only"
    mutation_allowed: false
  code:
    allowed_paths:
      - "train_eeg.py"
      - "eval_eeg.py"
      - "guard_dataset.py"
      - "configs/experiment.yaml"
      - "research/project.yaml"
      - "research/datasets.yaml"
      - "research/permissions.yaml"
      - "reports/latest_run.md"
      - "reports/methods_draft.md"
  network:
    policy: "ask_first"
    enabled_by_default: false
  reports:
    allowed_paths:
      - "reports/latest_run.md"
      - "reports/methods_draft.md"
guardrails:
  - "Do not mutate files under data/sample-eeg during autoresearch runs."
  - "Preserve subject-heldout evaluation unless the user explicitly changes the split policy."
  - "Run python guard_dataset.py before treating any metric improvement as valid."
  - "Use the smallest practical validation loop and avoid unnecessary notebook or artifact churn."
  - "Do not enable network access, install packages, or push changes without explicit approval."
launch_policy:
  require_user_go: true
  default_mode: "undecided"
