name: convo-focused-tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  focused-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest

      - name: Run focused Convo tests
        run: |
          python -m pytest tests/autoresearch/test_research_report.py
          python -m pytest tests/autoresearch/test_research_migrate_schema.py
