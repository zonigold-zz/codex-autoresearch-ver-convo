name: convo-focused-tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Show environment
        run: |
          python -VV
          python -m pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest

      - name: Run research report test
        run: |
          python -m pytest tests/autoresearch/test_research_report.py -q -vv --maxfail=1

      - name: Run schema migration test
        run: |
          python -m pytest tests/autoresearch/test_research_migrate_schema.py -q -vv --maxfail=1
